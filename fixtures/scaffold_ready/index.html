<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Courier Drift</title>
  </head>
  <body>
    <div class="app-shell">
      <section class="info-panel">
        <p class="eyebrow">Courier Drift / Project Scaffold</p>
        <h1>Industrial district boot screen</h1>
        <p class="lede" data-build-status>
          Canvas runtime placeholder scene is online.
        </p>
        <div class="callout">
          <p>Controls</p>
          <p><kbd>Enter</kbd> toggle brief / TODO overlay</p>
          <p><kbd>R</kbd> pulse the route layer</p>
          <p>Movement keys are captured, but movement is not implemented yet.</p>
        </div>
      </section>
      <section class="canvas-panel">
        <canvas
          id="game"
          aria-label="Courier Drift boot scene"
        ></canvas>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
